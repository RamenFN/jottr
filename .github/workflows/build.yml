name: Build macOS App

on:
  push:
    branches: [main]
  # SECURITY: Do NOT change this to pull_request_target — that trigger runs with
  # access to repository secrets, which would expose signing credentials to fork PRs.
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install create-dmg fileicon

      - name: Build
        run: make ARCH=universal APP_NAME=Jottr BUNDLE_ID=app.jottr CODESIGN_IDENTITY="-"

      - name: Create DMG
        run: make dmg ARCH=universal APP_NAME=Jottr BUNDLE_ID=app.jottr CODESIGN_IDENTITY="-"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jottr
          path: build/Jottr.dmg
